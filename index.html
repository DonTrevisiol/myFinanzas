<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mis Finanzas</title>
<link rel="icon" href="./assets/img/favicon.ico" type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./css/styles.css">
<!--FONTS:-->
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&display=swap" rel="stylesheet">
<!--SCRIPTS:-->
<script src="./js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<h1>Mis Finanzas</h1>

<!-- LOGIN -->
<div id="loginBox">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button id="btnLogin">Entrar</button>
</div>

<!-- APP -->
<div id="appContainer" style="display:none">

  <!-- NAV -->
  <div>
    <button id="btnDashboard">Dashboard</button>
    <button id="btnHistorial">Historial</button>
    <button id="btnLogout">Cerrar sesión</button>
  </div>
  <hr>
  <br>
  <!-- DASHBOARD -->
  <div id="viewDashboard">

    <div class="card total" id="totalContainer">
      TOTAL: <span id="total"></span>
    </div>
    <div id="filtrosDashboard" class="card">
		<select id="filtroTipoCuenta">
			<option value="todos">Todos los tipos</option>
			<option value="efectivo">Efectivo</option>
			<option value="digital">Digital</option>
		</select>

		<select id="filtroCategoriaCuenta">
			<option value="todos">Todas las categorías</option>
			<option value="ahorro">Ahorro</option>
			<option value="normal">Corriente</option>
		</select>

		<select id="filtroMonedaCuenta">
			<option value="todas">Todas las monedas</option>
		</select>
	</div>
	<div class="headerCuentas">
		<div class="cuentaName">Cuenta</div>
        <div class="cuentaType">Tipo</div>
        <div class="cuentaCash">Categoria</div>
	</div>
    <div id="cuentas"></div>

    <div class="actions">
      <button id="btnIngreso">+ Ingreso</button>
      <button id="btnGasto">- Gasto</button>
    </div>

  </div>

  <!-- 👁️HISTORIAL -->
  <div id="viewHistorial" style="display:none">
    <h2>Historial</h2>
    <div id="filtros">
	<!-- TIEMPO -->
		<select id="filtroTiempo">
			<option value="hoy">Hoy</option>
			<option value="semana">Esta semana</option>
			<option value="mes">Este mes</option>
			<option value="anio">Este año</option>
			<option value="recientes">Agregados recientemente</option>
			<option value="todos">Histórico</option>
			<option value="custom">Personalizado</option>
		</select>
  <!-- RANGO PERSONALIZADO -->
		<div id="rangoCustom" style="display:none;">
			<input type="date" id="fechaDesde">
			<input type="date" id="fechaHasta">
		</div>
  <!-- TIPO -->
		<select id="filtroTipo">
			<option value="todos">Todos</option>
			<option value="ingreso">Ingresos</option>
			<option value="gasto">Gastos</option>
			<option value="ahorro">Ahorros</option>
		</select>
		
	<!-- MONEDA -->
	<select id="filtroMonedaHistorial">
		<option value="todas"></option>
	</select>

	</div>
    <h2><div id="balanceMensual"></div></h2>
    <div id="historial"></div>
    <div id="paginacion"></div>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle"></h3>

    <select id="cuenta"></select>
    <select id="moneda">
      <option value="" disabled selected hidden>Seleccionar moneda</option>
    </select>
    <input id="monto" type="number" placeholder="Monto">
    <select id="categoria" required>    
    </select>
    <input id="descripcion" placeholder="Detalle">
    <input id="fecha" type="date">

    <button id="btnGuardarMov">Guardar</button>
    <button onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<script src="./js/supabase.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/cuentas.js"></script>
<script src="./js/movimientos.js"></script>
<script src="./js/app.js"></script>

</body>
</html>

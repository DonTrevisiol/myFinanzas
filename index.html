<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mis Finanzas</title>
<link rel="icon" href="./assets/img/favicon.ico" type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="./css/styles.css">

<script src="./js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<h1>Mis Finanzas</h1>

<!-- LOGIN -->
<div id="loginBox">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button id="btnLogin">Entrar</button>
</div>

<!-- APP -->
<div id="appContainer" style="display:none">

  <!-- NAV -->
  <div>
    <button id="btnDashboard">Dashboard</button>
    <button id="btnHistorial">Historial</button>
    <button id="btnLogout">Cerrar sesión</button>
  </div>

  <!-- DASHBOARD -->
  <div id="viewDashboard">

    <div class="card total">
      TOTAL: <span id="total">0</span>
    </div>

    <div id="cuentas"></div>

    <div class="actions">
      <button id="btnIngreso">+ Ingreso</button>
      <button id="btnGasto">- Gasto</button>
    </div>

  </div>

  <!-- 👁️HISTORIAL -->
  <div id="viewHistorial" style="display:none">
    <h2>Historial</h2>

    <div id="balanceMensual"></div>
    <div id="historial"></div>
    <div id="paginacion"></div>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle"></h3>

    <select id="cuenta"></select>
    <input id="monto" type="number" placeholder="Monto">

    <select id="categoria">
      <option value="comida">Comida</option>
      <option value="transporte">Transporte</option>
      <option value="ocio">Ocio</option>
      <option value="salario">Salario</option>
    </select>

    <input id="descripcion" placeholder="Detalle">

    <button id="btnGuardarMov">Guardar</button>
    <button onclick="cerrarModal()">Cancelar</button>
  </div>
</div>

<script src="./js/supabase.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/cuentas.js"></script>
<script src="./js/movimientos.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
